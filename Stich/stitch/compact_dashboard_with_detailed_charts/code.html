<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline-variant": "#afacac",
                        "primary": "#006a34",
                        "on-primary-fixed": "#004a22",
                        "surface": "#f9f6f5",
                        "secondary-dim": "#005c3c",
                        "surface-container-high": "#e5e2e1",
                        "tertiary-dim": "#005867",
                        "surface-container": "#eae7e7",
                        "surface-bright": "#f9f6f5",
                        "on-surface-variant": "#5c5b5b",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#00333d",
                        "tertiary-container": "#00dcfe",
                        "error-dim": "#9f0519",
                        "on-primary-fixed-variant": "#006a34",
                        "on-tertiary": "#ddf7ff",
                        "surface-tint": "#006a34",
                        "tertiary-fixed-dim": "#00cded",
                        "secondary-container": "#73fbbc",
                        "tertiary": "#006575",
                        "on-primary-container": "#005f2e",
                        "on-secondary-container": "#005e3e",
                        "surface-container-low": "#f3f0ef",
                        "on-error-container": "#570008",
                        "on-tertiary-container": "#004956",
                        "error": "#b31b25",
                        "surface-container-highest": "#dfdcdc",
                        "on-surface": "#2f2e2e",
                        "error-container": "#fb5151",
                        "primary-container": "#6dfe9c",
                        "on-secondary-fixed-variant": "#006946",
                        "inverse-surface": "#0e0e0e",
                        "secondary-fixed-dim": "#64ecaf",
                        "surface-dim": "#d6d4d3",
                        "on-primary": "#cdffd4",
                        "inverse-primary": "#6dfe9c",
                        "primary-fixed": "#6dfe9c",
                        "inverse-on-surface": "#9e9c9c",
                        "on-error": "#ffefee",
                        "on-background": "#2f2e2e",
                        "tertiary-fixed": "#00dcfe",
                        "primary-dim": "#005c2c",
                        "on-tertiary-fixed-variant": "#005361",
                        "outline": "#787676",
                        "secondary": "#006946",
                        "on-secondary-fixed": "#00492f",
                        "surface-variant": "#dfdcdc",
                        "secondary-fixed": "#73fbbc",
                        "primary-fixed-dim": "#5def8f",
                        "on-secondary": "#c9ffdf",
                        "background": "#f9f6f5"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow {
            box-shadow: 0 32px 64px -12px rgba(47, 46, 46, 0.04);
        }
        .vitality-gradient {
            background: linear-gradient(135deg, #006a34 0%, #6dfe9c 100%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f6f5;
        }
        @keyframes pulse-ring {
            0% { transform: scale(.33); }
            80%, 100% { opacity: 0; }
        }
        .pulse-marker::before {
            content: '';
            position: absolute;
            width: 300%;
            height: 300%;
            border-radius: 45px;
            background-color: #006a34;
            animation: pulse-ring 1.25s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="text-on-surface antialiased selection:bg-primary-container">
<!-- TopAppBar -->
<header class="bg-[#f9f6f5] dark:bg-neutral-900 flex justify-between items-center w-full px-6 py-4 sticky top-0 z-40">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#006a34] dark:text-[#4ADE80]">bolt</span>
<h1 class="font-['Inter'] font-bold tracking-tight text-[#2f2e2e] dark:text-neutral-100 text-lg">2,400 kcal</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest overflow-hidden border-2 border-primary-container">
<img class="w-full h-full object-cover" data-alt="professional headshot of a smiling person with soft natural lighting and a neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlDy2vk0-PCea4fYz0Hu_9p27EY3fJxzkJOqyXhfzGRgvrwUMPBnttWhtu8TpR83m4oz-9jhZ0nMOUVl6utxiXdzgeosrWyfUAai5BvqLDopOoNg76wXZCsozS6j_eFMrbByKJZD70SeSoxJseYsMMx_sVKSzo4nfFyIr7fHmMDEsBQegyV-yCMdZPMO4C20eQtPRcMQAf7-gBVgthk0qqdEuLaFME5O5lX7YSr7saukPqKR4JAZk9G0Gn2f8HdRpnr1jD5OzFnzs"/>
</div>
</header>
<main class="px-6 pb-32 max-w-md mx-auto space-y-8">
<!-- Hero Circle Section (Compact) -->
<section class="mt-4 relative flex justify-center items-center py-4">
<div class="relative w-48 h-48 flex items-center justify-center">
<!-- Circular Progress Background -->
<svg class="w-full h-full transform -rotate-90">
<circle class="text-surface-container" cx="96" cy="96" fill="transparent" r="88" stroke="currentColor" stroke-width="12"></circle>
<circle cx="96" cy="96" fill="transparent" r="88" stroke="url(#vitality-grad)" stroke-dasharray="552.92" stroke-dashoffset="138.23" stroke-linecap="round" stroke-width="12"></circle>
<defs>
<lineargradient id="vitality-grad" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#006a34;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#6dfe9c;stop-opacity:1"></stop>
</lineargradient>
</defs>
</svg>
<!-- Inner Label -->
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="text-on-surface-variant text-[10px] font-bold uppercase tracking-[0.15em]">Remaining</span>
<span class="text-4xl font-black text-on-surface tracking-tighter">1,640</span>
<span class="text-[10px] font-semibold text-on-surface-variant">of 2,400</span>
</div>
</div>
</section>
<!-- Horizontal Macro Cards -->
<section class="grid grid-cols-3 gap-3">
<div class="bg-surface-container-low p-3 rounded-xl border-l-4 border-primary">
<p class="text-[10px] font-bold text-on-surface-variant uppercase mb-1">Prot</p>
<p class="text-lg font-black text-on-surface">120<span class="text-[10px] font-medium opacity-60 ml-0.5">g</span></p>
</div>
<div class="bg-surface-container-low p-3 rounded-xl border-l-4 border-secondary">
<p class="text-[10px] font-bold text-on-surface-variant uppercase mb-1">Carb</p>
<p class="text-lg font-black text-on-surface">240<span class="text-[10px] font-medium opacity-60 ml-0.5">g</span></p>
</div>
<div class="bg-surface-container-low p-3 rounded-xl border-l-4 border-tertiary">
<p class="text-[10px] font-bold text-on-surface-variant uppercase mb-1">Fat</p>
<p class="text-lg font-black text-on-surface">65<span class="text-[10px] font-medium opacity-60 ml-0.5">g</span></p>
</div>
</section>
<!-- Weekly Progress (Weight Progress Card from Screen 8) -->
<section>
<div class="flex justify-between items-end mb-3">
<h2 class="text-xl font-black tracking-tight text-on-surface">Weekly Progress</h2>
<span class="text-[10px] font-bold text-primary uppercase bg-primary-container px-2 py-0.5 rounded-full">-4% kcal</span>
</div>
<div class="p-4 bg-primary-container rounded-xl flex items-center justify-between editorial-shadow">
<div>
<span class="block text-[10px] font-bold uppercase text-on-primary-container/60 mb-0.5">Net Weight</span>
<span class="text-2xl font-black text-on-primary-container">68.4 kg</span>
</div>
<span class="material-symbols-outlined text-on-primary-container text-3xl">trending_down</span>
</div>
</section>
<!-- Detailed Calorie Intake (Chart from Screen 8) -->
<section class="bg-surface-container-lowest rounded-xl p-5 editorial-shadow border border-surface-container">
<div class="flex justify-between items-center mb-6">
<h2 class="text-sm font-extrabold -tracking-tight">Detailed Calorie Intake</h2>
<span class="text-[10px] font-bold text-on-surface-variant px-2 py-0.5 bg-surface-container rounded-full uppercase">Weekly</span>
</div>
<div class="relative w-full h-40">
<!-- Y-Axis Labels -->
<div class="absolute left-0 top-0 h-full flex flex-col justify-between text-[8px] font-bold text-on-surface-variant pr-2 pb-5">
<span>3k</span>
<span>2k</span>
<span>1k</span>
<span>0</span>
</div>
<div class="ml-5 h-full relative">
<!-- Grid Lines -->
<div class="absolute inset-0 flex flex-col justify-between pb-5 opacity-5">
<div class="border-t border-on-surface w-full"></div>
<div class="border-t border-on-surface w-full"></div>
<div class="border-t border-on-surface w-full"></div>
<div class="border-t border-on-surface w-full"></div>
</div>
<!-- SVG Chart -->
<svg class="w-full h-full" preserveaspectratio="none" viewbox="0 0 100 100">
<defs>
<lineargradient id="chartGradient" x1="0" x2="0" y1="0" y2="1">
<stop offset="0%" stop-color="#006a34" stop-opacity="0.2"></stop>
<stop offset="100%" stop-color="#006a34" stop-opacity="0"></stop>
</lineargradient>
</defs>
<!-- Area Fill -->
<path d="M 0,25 L 16.6,15 L 33.3,5 L 50,40 L 66.6,20 L 83.3,60 L 100,62 L 100,100 L 0,100 Z" fill="url(#chartGradient)"></path>
<!-- Line -->
<path d="M 0,25 L 16.6,15 L 33.3,5 L 50,40 L 66.6,20 L 83.3,60 L 100,62" fill="none" stroke="#006a34" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<!-- Today Marker Pulse -->
<div class="absolute right-0 bottom-[38%] translate-x-[2px] translate-y-[2px]">
<div class="relative w-1.5 h-1.5">
<div class="pulse-marker absolute inset-0 rounded-full bg-primary flex items-center justify-center">
<div class="w-1.5 h-1.5 bg-white rounded-full border border-primary"></div>
</div>
</div>
</div>
<!-- X-Axis Labels -->
<div class="absolute bottom-0 left-0 w-full flex justify-between text-[8px] font-bold text-on-surface-variant pt-2">
<span class="w-[14.2%] text-center">M</span>
<span class="w-[14.2%] text-center">T</span>
<span class="w-[14.2%] text-center">W</span>
<span class="w-[14.2%] text-center">T</span>
<span class="w-[14.2%] text-center">F</span>
<span class="w-[14.2%] text-center">S</span>
<span class="w-[14.2%] text-center text-primary">S</span>
</div>
</div>
</div>
</section>
<!-- Hydration Tracker -->
<section>
<div class="bg-primary-container/30 rounded-[24px] p-4 flex items-center justify-between editorial-shadow">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<div>
<h3 class="text-sm font-bold text-on-surface">Hydration</h3>
<p class="text-xs font-medium text-on-primary-container">1.2L of 2.5L</p>
</div>
</div>
<div class="flex gap-1.5">
<button class="w-8 h-8 rounded-full bg-surface-container-lowest flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<button class="w-8 h-8 rounded-full vitality-gradient flex items-center justify-center text-on-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#f9f6f5]/80 dark:bg-neutral-900/80 backdrop-blur-xl rounded-t-[24px] border-t-[0.5px] border-[#afacac]/15 shadow-[0_-4px_32px_0_rgba(47,46,46,0.04)]">
<button class="flex flex-col items-center justify-center bg-[#6dfe9c] dark:bg-[#006a34] text-[#006a34] dark:text-[#6dfe9c] rounded-full px-4 py-1 active:scale-90 duration-200 ease-out">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="text-[10px] font-semibold uppercase tracking-wider font-['Inter'] mt-0.5">Log</span>
</button>
<button class="flex flex-col items-center justify-center text-[#5c5b5b] dark:text-neutral-400 px-4 py-1 hover:opacity-80 transition-opacity active:scale-90 duration-200 ease-out">
<span class="material-symbols-outlined">insights</span>
<span class="text-[10px] font-semibold uppercase tracking-wider font-['Inter'] mt-0.5">Trends</span>
</button>
<button class="flex flex-col items-center justify-center text-[#5c5b5b] dark:text-neutral-400 px-4 py-1 hover:opacity-80 transition-opacity active:scale-90 duration-200 ease-out">
<span class="material-symbols-outlined">description</span>
<span class="text-[10px] font-semibold uppercase tracking-wider font-['Inter'] mt-0.5">Plans</span>
</button>
<button class="flex flex-col items-center justify-center text-[#5c5b5b] dark:text-neutral-400 px-4 py-1 hover:opacity-80 transition-opacity active:scale-90 duration-200 ease-out">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-semibold uppercase tracking-wider font-['Inter'] mt-0.5">Profile</span>
</button>
</nav>
</body></html>
